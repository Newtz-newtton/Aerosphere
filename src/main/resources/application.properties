spring.application.name=aerosphere
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ----------------------------------------
# PostgreSQL Database Configuration
# ----------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/aerosphere
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT Configuration
jwt.secret=Qmc1/Rw2ZK8v0/v0ppW1vtXTO995Bplxg8YD4CDe91Y=
jwt.expiration=86400000


############################################################
# Kafka Configuration
############################################################

# Kafka Broker
spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer
spring.kafka.consumer.group-id=aerosphere-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# JSON Deserialization
spring.kafka.consumer.properties.spring.json.trusted.packages=com.aerosphere.kafka.event

# Listener
spring.kafka.listener.missing-topics-fatal=false
